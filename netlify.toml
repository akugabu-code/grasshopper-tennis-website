# Netlify Configuration File

[build]
  # 公開ディレクトリ（プロジェクトルート）
  publish = "."
  
  # ビルドコマンド（静的サイトなので不要）
  command = ""

# フォーム設定
[build.processing]
  skip_processing = false

# リダイレクトルール（SPA用、今回は不要だが念のため）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ヘッダー設定（セキュリティ強化）
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# キャッシュ設定（静的アセット - CSS/JS）
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# キャッシュ設定（画像 - 1日キャッシュ、再検証あり）
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTML ファイルのキャッシュ設定
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# JSON ファイルのキャッシュ設定
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/json; charset=utf-8"
